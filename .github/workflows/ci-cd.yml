name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
    - name: Run Pytest
      run: |
        cd backend
        pytest

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install Dependencies
      run: |
        cd frontend
        npm ci
    - name: Run Vitest
      run: |
        cd frontend
        npm run test

  deploy:
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: Deploy Backend to Render
      run: |
        if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" ]; then
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
        else
          echo "No deploy hook configured for backend"
        fi
    - name: Deploy Frontend to Render
      run: |
        if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" ]; then
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        else
          echo "No deploy hook configured for frontend"
        fi
