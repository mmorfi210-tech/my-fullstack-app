services:
  # Python FastAPI Backend (Dockerized)
  - type: web
    name: njarbo-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: njarbo-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

  # React Frontend (Static Site)
  - type: web
    name: njarbo-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://njarbo-backend.onrender.com
    routes:
      # Redirect all requests to index.html for React Router SPA support
      - type: rewrite
        src: /*
        dest: /index.html

databases:
  - name: njarbo-db
    plan: free
    databaseName: njarbo
    user: morfi
